<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — QuickNotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/login.css" />
</head>
<body>

  <div class="login-page">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <svg width="30" height="30" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="6" fill="#6EC1FF"/>
          <path d="M6 7h10M6 11h10M6 15h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        QuickNotes
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Sign in to start taking notes</p>

      <!-- Error message (shown when ?error= is present in URL) -->
      <div class="login-error" id="login-error" style="display:none;"></div>

      <!-- Google Sign-In button -->
      <a class="btn-google" href="/auth/google">
        <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </a>

      <div class="login-divider"></div>

      <a class="back-link" href="/">&#8592; Back to home</a>

    </div>

    <footer class="login-footer">
      QuickNotes · AI-powered lecture notes
    </footer>
  </div>

  <script>
    // Show error message from query param
    (function () {
      const params = new URLSearchParams(window.location.search);
      const err = params.get("error");
      if (!err) return;

      const messages = {
        oauth_denied:          "Sign-in was cancelled. Please try again.",
        state_mismatch:        "Security check failed. Please try signing in again.",
        no_code:               "No authorization code received. Please try again.",
        token_exchange_failed: "Could not complete sign-in. Please try again later.",
        no_access_token:       "Could not retrieve access token. Please try again.",
        userinfo_failed:       "Could not fetch your profile. Please try again.",
      };

      const el = document.getElementById("login-error");
      el.textContent = messages[err] || "An unexpected error occurred. Please try again.";
      el.style.display = "block";
    })();
  </script>

</body>
</html>
