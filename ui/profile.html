<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile · QuickNotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/home.css" />
  <link rel="stylesheet" href="/static/page.css" />
</head>
<body class="page-body">

  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="/home">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="6" fill="#6EC1FF"/>
          <path d="M6 7h10M6 11h10M6 15h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        QuickNotes
      </a>
      <div></div>
      <div class="nav-profile" id="nav-profile">
        <button class="profile-trigger" id="profile-trigger" aria-haspopup="true" aria-expanded="false">
          <img class="profile-avatar" id="profile-avatar" src="" alt="User avatar" />
          <span class="profile-name" id="profile-name"></span>
          <svg class="profile-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="profile-dropdown" id="profile-dropdown" aria-hidden="true">
          <a class="dropdown-item dropdown-item-active" href="/profile">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M2.5 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Your Profile
          </a>
          <a class="dropdown-item" href="/settings">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.93 2.93l1.06 1.06M11.01 11.01l1.06 1.06M2.93 12.07l1.06-1.06M11.01 3.99l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Settings
          </a>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item dropdown-item-danger" href="/auth/logout">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M6 2H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h3M10 10l3-3-3-3M13 7.5H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Sign Out
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="page-main">
    <div class="page-container">

      <!-- Profile card -->
      <div class="section-card profile-hero">
        <div class="profile-hero-avatar-wrap">
          <img id="hero-avatar" class="profile-hero-avatar" src="" alt="Avatar" />
        </div>
        <div class="profile-hero-info">
          <h1 id="hero-name" class="profile-hero-name">—</h1>
          <p id="hero-email" class="profile-hero-email">—</p>
          <span class="profile-badge">
            <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Google Account
          </span>
        </div>
      </div>

      <!-- Stats -->
      <div class="section-label">Overview</div>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="stat-sessions">—</span>
          <span class="stat-label">Sessions</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-notes">—</span>
          <span class="stat-label">Notes Generated</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-words">—</span>
          <span class="stat-label">Words Transcribed</span>
        </div>
      </div>

      <!-- Account section -->
      <div class="section-label">Account</div>
      <div class="section-card">
        <div class="setting-row">
          <div class="setting-info">
            <span class="setting-title">Connected Account</span>
            <span class="setting-desc" id="account-email">—</span>
          </div>
          <span class="badge-connected">Connected</span>
        </div>
        <div class="section-divider"></div>
        <div class="setting-row">
          <div class="setting-info">
            <span class="setting-title">Sign out of QuickNotes</span>
            <span class="setting-desc">You'll need to sign in again to access your notes.</span>
          </div>
          <a href="/auth/logout" class="btn-danger">Sign Out</a>
        </div>
      </div>

    </div>
  </main>

  <footer>QuickNotes · AI-powered lecture notes</footer>

  <script src="/static/page.js"></script>
</body>
</html>
