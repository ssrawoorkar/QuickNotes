<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session · QuickNotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/home.css" />
</head>
<body>

  <!-- Nav -->
  <nav>
    <div class="nav-inner">

      <!-- Left: logo -->
      <div class="nav-logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="6" fill="#6EC1FF"/>
          <path d="M6 7h10M6 11h10M6 15h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        QuickNotes
      </div>

      <!-- Center: recording controls -->
      <div class="nav-controls">
        <span id="status-dot"></span>
        <span id="status">Idle</span>
        <button id="btn-start">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="5" fill="white" opacity="0.9"/>
            <circle cx="7" cy="7" r="3" fill="white"/>
          </svg>
          Start Recording
        </button>
        <button id="btn-stop" disabled>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <rect x="2" y="2" width="8" height="8" rx="1.5" fill="currentColor"/>
          </svg>
          Stop
        </button>
      </div>

      <!-- Right: user profile -->
      <div class="nav-profile" id="nav-profile">
        <button class="profile-trigger" id="profile-trigger" aria-haspopup="true" aria-expanded="false">
          <img
            class="profile-avatar"
            id="profile-avatar"
            src=""
            alt="User avatar"
          />
          <span class="profile-name" id="profile-name"></span>
          <svg class="profile-chevron" id="profile-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Dropdown -->
        <div class="profile-dropdown" id="profile-dropdown" aria-hidden="true">
          <a class="dropdown-item" href="/profile">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <circle cx="7.5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M2.5 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            Your Profile
          </a>
          <a class="dropdown-item" href="/settings">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.4"/>
              <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.93 2.93l1.06 1.06M11.01 11.01l1.06 1.06M2.93 12.07l1.06-1.06M11.01 3.99l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            Settings
          </a>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item dropdown-item-danger" href="/auth/logout">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M6 2H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h3M10 10l3-3-3-3M13 7.5H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Sign Out
          </a>
        </div>
      </div>

    </div>
  </nav>

  <!-- Panels -->
  <main>
    <div class="workspace">

      <div class="card">
        <div class="card-header">
          <span class="card-title">Live Transcript</span>
          <button id="btn-export-transcript" class="btn-ghost">Export .txt</button>
        </div>
        <div class="card-body" id="transcript-output">
          <p class="empty">Transcript will appear here once recording starts…</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">AI Generated Notes</span>
          <div class="notes-actions">
            <button id="btn-save-drive" class="btn-ghost btn-drive" title="Save to Google Drive">
              <svg width="13" height="13" viewBox="0 0 87.3 78" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066DA"/>
                <path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 48.55A9 9 0 0 0 0 53.05h27.5z" fill="#00AC47"/>
                <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 11.2z" fill="#EA4335"/>
                <path d="M43.65 25L57.4 1.2a9.45 9.45 0 0 0-4.5-1.2H34.4c-1.6 0-3.1.45-4.5 1.2z" fill="#00832D"/>
                <path d="M59.8 53.05h27.5c0-1.55-.4-3.1-1.2-4.5L60.7 4.5c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25z" fill="#2684FC"/>
                <path d="M43.65 53.05 27.5 53.05 13.75 76.85c1.35.8 2.9 1.15 4.5 1.15h50.8c1.6 0 3.1-.4 4.5-1.15z" fill="#FFBA00"/>
              </svg>
              Save to Drive
            </button>
            <button id="btn-open-docs" class="btn-ghost btn-docs" title="Open in Google Docs">
              <svg width="13" height="16" viewBox="0 0 18 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M11 0H2C.9 0 0 .9 0 2v20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-7-7z" fill="#4285F4"/>
                <path d="M11 0v7h7L11 0z" fill="#A1C2FA"/>
                <path d="M4 13h10M4 16h10M4 10h6" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              Open in Docs
            </button>
            <button id="btn-export-notes" class="btn-ghost" title="Download as .md">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                <path d="M8 2v8m0 0L5 7m3 3l3-3M2 13h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Download
            </button>
          </div>
        </div>
        <div class="card-body" id="notes-output">
          <p class="empty">AI-generated notes will appear here automatically…</p>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    QuickNotes · AI-powered lecture notes
  </footer>

  <script src="/static/session.js"></script>
</body>
</html>
